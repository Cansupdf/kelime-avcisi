<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Kelime Avcısı</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;user-select:none;font-family:'Nunito',sans-serif}
#bgCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* MENU */
#main-menu{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center}
#main-menu.hide{display:none}
#menu-card{background:rgba(5,10,40,.96);border:1.5px solid rgba(100,200,255,.3);border-radius:32px;
  padding:44px 32px;text-align:center;width:88%;max-width:340px;
  box-shadow:0 0 80px rgba(80,150,255,.15),0 24px 60px rgba(0,0,0,.7)}
.menu-title{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;
  background:linear-gradient(135deg,#43ea80,#00d4ff);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:2px}
.menu-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:32px;font-weight:700}
.menu-btn{width:100%;padding:15px;border:none;border-radius:22px;font-size:17px;
  font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:12px}
#btn-new{background:linear-gradient(135deg,#1a56d6,#00d4ff);color:#fff}
#btn-continue{background:linear-gradient(135deg,#1a9a50,#43ea80);color:#fff}
#btn-continue.disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);cursor:default}
.menu-save-info{font-size:12px;color:rgba(255,255,255,.35);margin-top:4px;font-weight:700}

/* GAME LAYOUT */
#game{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;
  height:100dvh;max-width:480px;margin:0 auto;padding:0 6px;overflow:hidden}

/* HEADER */
#header{width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:8px 4px 2px;flex-shrink:0}
.hbadge{background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.25);
  border-radius:20px;padding:5px 14px;color:#fff;font-weight:800;font-size:13px;
  backdrop-filter:blur(10px)}
#score-badge{background:rgba(255,179,0,.9);border-color:rgba(255,220,0,.5)}
#title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;
  letter-spacing:2px;text-shadow:0 0 20px rgba(255,255,255,.5)}

/* CROSSWORD */
#slots-area{flex:1;width:100%;display:flex;align-items:center;justify-content:center;
  min-height:0;overflow:hidden;padding:2px 4px}
#crossword-grid{display:grid}
.cw-cell{display:flex;align-items:center;justify-content:center;
  font-weight:900;font-family:'Orbitron',sans-serif;border-radius:4px;transition:all .3s}
.cw-cell.empty{background:transparent;border:none}
.cw-cell.pending{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18)}
.cw-cell.found{background:linear-gradient(135deg,#1a9a50,#43ea80);
  border:1.5px solid rgba(67,234,128,.5);color:#fff;
  box-shadow:0 2px 8px rgba(67,234,128,.3);animation:cellPop .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes cellPop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* PROGRESS */
#progress-row{width:100%;display:flex;align-items:center;gap:8px;padding:2px 8px;flex-shrink:0}
#prog-bar-bg{flex:1;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#prog-bar{height:100%;background:linear-gradient(90deg,#43ea80,#00d4ff);border-radius:3px;width:0%;transition:width .4s}
#prog-text{font-size:11px;color:rgba(255,255,255,.5);font-weight:800;min-width:28px;text-align:right}

/* FOUND WORD */
#found-row{height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#found-word{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;
  color:#43ea80;letter-spacing:3px;opacity:0;transition:opacity .3s}

/* CUR WORD */
#cur-word{min-height:32px;min-width:100px;padding:5px 20px;
  background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.2);
  border-radius:18px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:15px;font-weight:900;letter-spacing:3px;text-align:center;
  backdrop-filter:blur(8px);align-self:center;flex-shrink:0}
#cur-word.shake{animation:shake .4s ease;background:rgba(200,30,30,.4)}
#cur-word.flash{background:rgba(30,200,100,.4)}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}

/* CIRCLE */
#circle-wrap{position:relative;width:min(220px,58vw);height:min(220px,58vw);
  flex-shrink:0;margin:0 auto}
#svg-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.lbtn{position:absolute;border-radius:50%;
  background:linear-gradient(135deg,#1a3a8a,#2a5cd6);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;
  border:2px solid rgba(255,255,255,.35);
  box-shadow:0 4px 15px rgba(0,0,50,.5),inset 0 1px 0 rgba(255,255,255,.15);
  transition:transform .1s,background .12s;touch-action:none;
  font-weight:900;color:#fff;font-family:'Nunito',sans-serif;
  text-shadow:0 1px 4px rgba(0,0,0,.6)}
.lbtn.active{background:linear-gradient(135deg,#43ea80,#00d4ff);transform:scale(1.1);
  box-shadow:0 0 18px rgba(67,234,128,.6)}

/* BOTTOM */
#bottom{width:100%;display:flex;flex-direction:column;align-items:center;
  padding-bottom:max(6px,env(safe-area-inset-bottom));gap:3px;flex-shrink:0}

/* HINT */
#hint-btn{position:fixed;right:10px;bottom:max(14px,env(safe-area-inset-bottom));
  width:60px;height:60px;border-radius:14px;
  background:linear-gradient(135deg,#2a1a00,#5a3800);
  border:2px solid rgba(255,180,0,.5);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  box-shadow:0 4px 16px rgba(0,0,0,.5);z-index:50}
#hint-btn .hi{font-size:18px}
#hint-btn .hl{font-size:9px;color:rgba(255,180,0,.9);font-weight:900}
#hint-btn .hc{font-size:9px;color:rgba(255,180,0,.7);font-weight:800}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,30,.85);backdrop-filter:blur(12px);
  align-items:center;justify-content:center}
#overlay.show{display:flex}
#ocard{background:rgba(5,10,40,.92);border:1.5px solid rgba(100,200,255,.35);
  border-radius:28px;padding:36px 28px;text-align:center;width:88%;max-width:340px}
#ocard h2{font-family:'Orbitron',sans-serif;font-size:22px;margin-bottom:6px;
  background:linear-gradient(135deg,#43ea80,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.olinfo{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:10px}
.oscore{font-size:30px;font-weight:900;color:#ffb300;margin-bottom:22px;font-family:'Orbitron',sans-serif}
#next-btn{background:linear-gradient(135deg,#1a56d6,#00d4ff);color:#fff;border:none;
  border-radius:22px;padding:14px 40px;font-size:18px;font-weight:900;cursor:pointer;
  font-family:'Nunito',sans-serif}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);
  background:rgba(20,20,50,.95);border:1px solid rgba(255,255,255,.2);
  border-radius:18px;padding:9px 22px;font-size:13px;font-weight:800;color:#fff;
  z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

.conf{position:fixed;top:-10px;border-radius:2px;z-index:400;pointer-events:none;
  animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div id="main-menu">
  <div id="menu-card">
    <div class="menu-title">KELİME<br>AVCISI</div>
    <div class="menu-sub">🔍 Harfleri birleştir, kelimeleri keşfet!</div>
    <button class="menu-btn" id="btn-new" onclick="startNew()">🎮 YENİ OYUN</button>
    <button class="menu-btn" id="btn-continue" onclick="startContinue()">▶️ DEVAM ET</button>
    <div class="menu-save-info" id="save-info"></div>
  </div>
</div>

<div id="game">
  <div id="header">
    <div class="hbadge" id="lvl-badge">Bölüm 1</div>
    <div id="title">KELİME AVCISI</div>
    <div class="hbadge" id="score-badge">⭐<span id="score-val">0</span></div>
  </div>
  <div id="slots-area"></div>
  <div id="bottom">
    <div id="progress-row">
      <div id="prog-bar-bg"><div id="prog-bar"></div></div>
      <div id="prog-text">0/0</div>
    </div>
    <div id="found-row"><div id="found-word"></div></div>
    <div id="cur-word">?</div>
    <div id="circle-wrap">
      <svg id="svg-lines"></svg>
    </div>
  </div>
</div>

<button id="hint-btn" onclick="useHint()">
  <span class="hi">💡</span>
  <span class="hl">İPUCU</span>
  <span class="hc">-100⭐</span>
</button>

<div id="overlay">
  <div id="ocard">
    <h2>🌟 TAMAMLANDI!</h2>
    <div class="olinfo" id="o-info"></div>
    <div class="oscore" id="o-score"></div>
    <button id="next-btn" onclick="nextLevel()">Sonraki →</button>
  </div>
</div>
<div id="toast"></div>

function getPuzzle(lvl){
  const d=LEVELS_DB[Math.min(lvl,1000)-1]||LEVELS_DB[0];
  return{name:'Bölüm '+lvl,letters:[...d.l],allWords:[...d.w],placements:d.p||[],required:[...d.r]};
}

// SAVE
function save(){try{localStorage.setItem('ka_l',lvlIdx);localStorage.setItem('ka_s',score);}catch(e){}}
function loadSave(){try{return{l:parseInt(localStorage.getItem('ka_l'))||1,s:parseInt(localStorage.getItem('ka_s'))||0};}catch(e){return{l:1,s:0};}}
function hasSave(){try{return(parseInt(localStorage.getItem('ka_l'))||1)>1;}catch(e){return false;}}
function startNew(){try{localStorage.removeItem('ka_l');localStorage.removeItem('ka_s');}catch(e){}lvlIdx=1;score=0;document.getElementById('score-val').textContent=0;document.getElementById('main-menu').classList.add('hide');init();}
function startContinue(){if(document.getElementById('btn-continue').classList.contains('disabled'))return;const s=loadSave();lvlIdx=s.l;score=s.s;document.getElementById('score-val').textContent=score;document.getElementById('main-menu').classList.add('hide');init();}

// SOUND
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
function getAC(){if(!ac)try{ac=new AC();}catch(e){}return ac;}
function tone(f,t,v,d,dl=0){const a=getAC();if(!a)return;try{const o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t;o.frequency.setValueAtTime(f,a.currentTime+dl);g.gain.setValueAtTime(0,a.currentTime+dl);g.gain.linearRampToValueAtTime(v,a.currentTime+dl+.01);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+dl+d);o.start(a.currentTime+dl);o.stop(a.currentTime+dl+d+.05);}catch(e){}}
function sndClick(){tone(500,'sine',.12,.07);}
function sndOk(){[0,.08,.15].forEach((d,i)=>tone([523,659,784][i],'sine',.18,.15,d));}
function sndErr(){tone(180,'sawtooth',.15,.15);tone(140,'sawtooth',.1,.15,.1);}
function sndWin(){[0,.1,.2,.3,.42].forEach((d,i)=>tone([523,587,659,698,784][i],'sine',.22,.2,d));}

let lvlIdx=1,score=0,found=new Set(),selected=[],dragging=false,puzzle=null;

// BG
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let stars=[],bgT=0,themeIdx=0;
const themes=[['#050820','#0a1240'],['#0d0020','#1a0040'],['#001020','#002040'],['#0a0500','#201000'],['#001a00','#003010'],['#200010','#400020']];
function initBg(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;stars=Array.from({length:160},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2+.4,a:Math.random()*.7+.2,b:Math.random()*3+1}));}
function drawBg(){const[top,bot]=themes[themeIdx%themes.length];const g=ctx.createLinearGradient(0,0,0,canvas.height);g.addColorStop(0,top);g.addColorStop(1,bot);ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);bgT+=.02;stars.forEach(s=>{const a=s.a*(.6+.4*Math.sin(bgT*s.b));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();});requestAnimationFrame(drawBg);}

// CROSSWORD RENDER
function renderSlots(){
  const area=document.getElementById('slots-area');
  area.innerHTML='';
  if(!puzzle||!puzzle.placements.length)return;
  const pl=puzzle.placements;
  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  pl.forEach(p=>{
    for(let i=0;i<p.word.length;i++){
      const r=p.dir==='V'?p.row+i:p.row;
      const c=p.dir==='H'?p.col+i:p.col;
      minR=Math.min(minR,r);maxR=Math.max(maxR,r);
      minC=Math.min(minC,c);maxC=Math.max(maxC,c);
    }
  });
  const rows=maxR-minR+1,cols=maxC-minC+1;
  const maxW=Math.min(window.innerWidth,480)-32;
  const maxH=window.innerHeight*0.33;
  const CELL=Math.max(Math.min(Math.floor(maxW/cols),Math.floor(maxH/rows),36),16);
  const FONT=Math.max(Math.floor(CELL*.46),9);

  const gmap={};
  puzzle.allWords.forEach((word,wi)=>{
    const p=pl[wi];if(!p)return;
    for(let i=0;i<word.length;i++){
      const r=p.dir==='V'?p.row+i:p.row;
      const c=p.dir==='H'?p.col+i:p.col;
      const k=r+'_'+c;
      if(!gmap[k])gmap[k]={char:word[i],words:[]};
      if(!gmap[k].words.includes(wi))gmap[k].words.push(wi);
    }
  });

  const grid=document.createElement('div');
  grid.id='crossword-grid';
  grid.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  grid.style.gridTemplateRows=`repeat(${rows},${CELL}px)`;
  grid.style.gap='1px';

  for(let r=minR;r<=maxR;r++){
    for(let c=minC;c<=maxC;c++){
      const cell=document.createElement('div');
      cell.className='cw-cell';
      cell.style.width=CELL+'px';cell.style.height=CELL+'px';cell.style.fontSize=FONT+'px';
      const k=r+'_'+c;
      if(gmap[k]){
        cell.dataset.key=k;cell.dataset.char=gmap[k].char;cell.dataset.words=gmap[k].words.join(',');
        const anyFound=gmap[k].words.some(wi=>found.has(puzzle.allWords[wi]));
        if(anyFound){cell.classList.add('found');cell.textContent=gmap[k].char;}
        else cell.classList.add('pending');
      } else cell.classList.add('empty');
      grid.appendChild(cell);
    }
  }
  area.appendChild(grid);
}

// CIRCLE RENDER
function renderCircle(){
  const wrap=document.getElementById('circle-wrap');
  const S=wrap.offsetWidth||200;
  const half=S/2,N=puzzle.letters.length,R=half*.72;
  wrap.querySelectorAll('.lbtn').forEach(b=>b.remove());
  const BW=Math.min(52,S*.24);
  puzzle.letters.forEach((ch,i)=>{
    const ang=(2*Math.PI*i/N)-Math.PI/2;
    const x=half+R*Math.cos(ang),y=half+R*Math.sin(ang);
    const btn=document.createElement('div');
    btn.className='lbtn';btn.textContent=ch;btn.dataset.i=i;btn.dataset.x=x;btn.dataset.y=y;
    btn.style.cssText=`left:${x-BW/2}px;top:${y-BW/2}px;width:${BW}px;height:${BW}px;font-size:${Math.max(BW*.42,11)}px`;
    wrap.appendChild(btn);
  });
  const svg=document.getElementById('svg-lines');
  svg.setAttribute('viewBox',`0 0 ${S} ${S}`);svg.innerHTML='';
}

function drawLines(){
  const svg=document.getElementById('svg-lines');svg.innerHTML='';
  for(let i=0;i<selected.length-1;i++){
    const a=document.querySelector(`.lbtn[data-i="${selected[i]}"]`);
    const b=document.querySelector(`.lbtn[data-i="${selected[i+1]}"]`);
    if(!a||!b)continue;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',a.dataset.x);line.setAttribute('y1',a.dataset.y);
    line.setAttribute('x2',b.dataset.x);line.setAttribute('y2',b.dataset.y);
    line.setAttribute('stroke','rgba(67,234,128,.7)');line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-linecap','round');svg.appendChild(line);
  }
}

function updateProgress(){
  const t=puzzle.allWords.length,d=found.size;
  document.getElementById('prog-bar').style.width=(d/t*100)+'%';
  document.getElementById('prog-text').textContent=d+'/'+t;
}

// INPUT
const wrap=document.getElementById('circle-wrap');
function startDrag(btn){if(!btn)return;dragging=true;const i=parseInt(btn.dataset.i);selected=[i];btn.classList.add('active');sndClick();updateCurWord();drawLines();}
function moveDrag(btn){if(!dragging||!btn)return;const i=parseInt(btn.dataset.i);if(selected.includes(i))return;selected.push(i);btn.classList.add('active');sndClick();updateCurWord();drawLines();}
function endDrag(){if(!dragging)return;dragging=false;submitWord();selected=[];document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));document.getElementById('cur-word').textContent='?';drawLines();}
function updateCurWord(){document.getElementById('cur-word').textContent=selected.map(i=>puzzle.letters[i]).join('')||'?';}

wrap.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el)startDrag(el.closest('.lbtn'));},{passive:false});
wrap.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el)moveDrag(el.closest('.lbtn'));},{passive:false});
wrap.addEventListener('touchend',e=>{e.preventDefault();endDrag();},{passive:false});
wrap.addEventListener('mousedown',e=>{const b=e.target?.closest('.lbtn');if(b)startDrag(b);});
wrap.addEventListener('mousemove',e=>{if(dragging){const b=e.target?.closest('.lbtn');if(b)moveDrag(b);}});
wrap.addEventListener('mouseup',endDrag);
document.addEventListener('mouseup',endDrag);

// SUBMIT
function submitWord(){
  const word=selected.map(i=>puzzle.letters[i]).join('');
  if(word.length<2)return;
  if(found.has(word)){showToast('Zaten bulundu!');shake();return;}
  if(puzzle.allWords.includes(word)){
    found.add(word);score+=word.length*10;
    document.getElementById('score-val').textContent=score;
    save();sndOk();showFound(word);revealCells(word);updateProgress();
    if(found.size===puzzle.allWords.length)setTimeout(showWin,700);
  } else {shake();sndErr();showToast('Geçersiz kelime!');}
}

function revealCells(word){
  const wi=puzzle.allWords.indexOf(word);
  document.querySelectorAll('.cw-cell.pending').forEach(cell=>{
    if(!cell.dataset.words)return;
    if(cell.dataset.words.split(',').map(Number).includes(wi)){
      cell.classList.remove('pending');cell.classList.add('found');cell.textContent=cell.dataset.char;
    }
  });
}

function shake(){const c=document.getElementById('cur-word');c.classList.add('shake');setTimeout(()=>c.classList.remove('shake'),400);}
function showFound(w){const el=document.getElementById('found-word');el.textContent=w;el.style.opacity=1;setTimeout(()=>el.style.opacity=0,1100);confetti();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}

// HINT
function useHint(){
  const rem=puzzle.allWords.filter(w=>!found.has(w));
  if(!rem.length)return;
  if(score<100){showToast('100 puana ihtiyaç var!');return;}
  score-=100;document.getElementById('score-val').textContent=score;
  const w=rem[0];found.add(w);revealCells(w);showFound(w);updateProgress();save();
  if(found.size===puzzle.allWords.length)setTimeout(showWin,700);
}

// WIN
function showWin(){
  sndWin();
  document.getElementById('o-info').textContent='Bölüm '+lvlIdx+' tamamlandı!';
  document.getElementById('o-score').textContent='⭐ '+score;
  document.getElementById('overlay').classList.add('show');
  themeIdx++;confetti();confetti();
}
function nextLevel(){
  document.getElementById('overlay').classList.remove('show');
  lvlIdx=Math.min(lvlIdx+1,1000);save();init();
}

// CONFETTI
function confetti(){
  const colors=['#43ea80','#00d4ff','#ffb300','#ff6b6b','#a78bfa'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div');c.className='conf';
    c.style.cssText=`left:${20+Math.random()*60}%;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${colors[i%5]};transform:rotate(${Math.random()*360}deg);animation-duration:${1.2+Math.random()*1}s;animation-delay:${Math.random()*.3}s;opacity:.9`;
    document.body.appendChild(c);setTimeout(()=>c.remove(),2500);
  }
}

// INIT
function init(){
  found=new Set();selected=[];dragging=false;
  puzzle=getPuzzle(lvlIdx);
  document.getElementById('lvl-badge').textContent='Bölüm '+lvlIdx;
  document.getElementById('score-val').textContent=score;
  document.getElementById('cur-word').textContent='?';
  document.getElementById('found-word').style.opacity=0;
  renderSlots();
  setTimeout(renderCircle,50);
  updateProgress();
}

window.addEventListener('resize',()=>{initBg();if(puzzle){renderSlots();renderCircle();}});
window.addEventListener('load',()=>{
  initBg();drawBg();
  const btn=document.getElementById('btn-continue');
  const info=document.getElementById('save-info');
  if(hasSave()){const s=loadSave();btn.classList.remove('disabled');info.textContent='📍 Bölüm '+s.l+' — '+s.s+' puan';}
  else{btn.classList.add('disabled');info.textContent='Henüz kayıt yok';}
});
</script>
</body>
</html>
