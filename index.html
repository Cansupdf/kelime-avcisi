<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kelime Avcısı</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;user-select:none;font-family:'Nunito',sans-serif}
#bgCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* MAIN MENU */
#main-menu{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center}
#main-menu.hide{display:none}
#menu-card{background:rgba(5,10,40,.96);border:1.5px solid rgba(100,200,255,.3);
  border-radius:32px;padding:44px 32px;text-align:center;width:88%;max-width:340px;
  box-shadow:0 0 80px rgba(80,150,255,.15),0 24px 60px rgba(0,0,0,.7)}
#menu-card .menu-title{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;
  background:linear-gradient(135deg,#43ea80,#00d4ff);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;margin-bottom:4px;letter-spacing:2px}
#menu-card .menu-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:32px;font-weight:700}
.menu-btn{width:100%;padding:15px;border:none;border-radius:22px;font-size:17px;
  font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;margin-bottom:12px;letter-spacing:.5px}
#btn-new{background:linear-gradient(135deg,#1a56d6,#00d4ff);color:#fff}
#btn-continue{background:linear-gradient(135deg,#1a9a50,#43ea80);color:#fff}
#btn-continue.disabled{background:rgba(255,255,255,.1);color:rgba(255,255,255,.3)}
.menu-save-info{font-size:12px;color:rgba(255,255,255,.35);margin-top:4px;font-weight:700}

/* GAME */
#game{position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;height:100dvh;max-width:480px;margin:0 auto;padding:0 8px;overflow:hidden}

/* HEADER */
#header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 4px 4px}
.hbadge{background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.25);
  border-radius:20px;padding:5px 16px;color:#fff;font-weight:800;font-size:14px;
  backdrop-filter:blur(10px)}
#score-badge{background:rgba(255,179,0,.9);border-color:rgba(255,220,0,.5)}
#score-val{font-weight:900}
#title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,.6),0 2px 8px rgba(0,0,0,.5);letter-spacing:2px}

/* CROSSWORD GRID AREA */
#slots-area{flex:1;width:100%;display:flex;align-items:center;justify-content:center;
  min-height:0;overflow:hidden;padding:4px}
#crossword-grid{display:grid;gap:2px}
.cw-cell{display:flex;align-items:center;justify-content:center;
  font-weight:900;font-family:'Orbitron',sans-serif;border-radius:5px;
  transition:all .3s}
.cw-cell.empty{background:transparent;border:none}
.cw-cell.pending{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);color:transparent}
.cw-cell.found{background:linear-gradient(135deg,#1a9a50,#43ea80);
  border:1.5px solid rgba(67,234,128,.6);color:#fff;
  box-shadow:0 2px 10px rgba(67,234,128,.35);animation:cellPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes cellPop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes cellFlash{0%,100%{opacity:1}50%{opacity:.3}}

/* PROGRESS */
#progress-row{width:100%;display:flex;align-items:center;gap:8px;padding:0 8px 2px}
#prog-bar-bg{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
#prog-bar{height:100%;background:linear-gradient(90deg,#43ea80,#00d4ff);border-radius:3px;
  width:0%;transition:width .4s}
#prog-text{font-size:12px;color:rgba(255,255,255,.5);font-weight:800;min-width:30px;text-align:right}

/* FOUND WORD DISPLAY */
#found-row{height:24px;display:flex;align-items:center;justify-content:center}
#found-word{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;
  color:#43ea80;letter-spacing:3px;opacity:0;transition:opacity .3s}

/* CURRENT WORD */
#cur-word{min-height:34px;min-width:120px;padding:6px 22px;
  background:rgba(0,0,0,.4);border:1.5px solid rgba(255,255,255,.2);
  border-radius:20px;color:#fff;font-family:'Orbitron',sans-serif;
  font-size:16px;font-weight:900;letter-spacing:4px;text-align:center;
  backdrop-filter:blur(8px);align-self:center}
#cur-word.shake{animation:shake .4s ease;background:rgba(200,30,30,.4);border-color:rgba(255,80,80,.5)}
#cur-word.flash{animation:flashGreen .45s ease;background:rgba(30,200,100,.4)}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
@keyframes flashGreen{0%,100%{background:rgba(0,0,0,.4)}50%{background:rgba(30,200,100,.5)}}

/* LETTER CIRCLE */
#circle-wrap{position:relative;width:min(240px,62vw);height:min(240px,62vw);flex-shrink:0;margin:0 auto}
#svg-lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.lbtn{position:absolute;width:min(56px,11.5vw);height:min(56px,11.5vw);border-radius:50%;
  background:linear-gradient(135deg,#1a3a8a,#2a5cd6);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;
  border:2.5px solid rgba(255,255,255,.35);
  box-shadow:0 4px 18px rgba(0,0,50,.5),inset 0 1px 0 rgba(255,255,255,.15);
  transition:transform .1s,background .12s;touch-action:none;
  font-size:min(20px,4vw);font-weight:900;color:#fff;font-family:'Nunito',sans-serif;
  text-shadow:0 1px 6px rgba(0,0,0,.6)}
.lbtn.active{background:linear-gradient(135deg,#43ea80,#00d4ff);transform:scale(1.1);
  box-shadow:0 0 20px rgba(67,234,128,.6)}
.lbtn.used{opacity:.4}

/* BOTTOM */
#bottom{width:100%;display:flex;flex-direction:column;align-items:center;
  padding-bottom:max(8px,env(safe-area-inset-bottom));gap:4px;flex-shrink:0}

/* HINT */
#hint-btn{position:fixed;right:12px;bottom:max(16px,env(safe-area-inset-bottom));
  width:64px;height:64px;border-radius:16px;
  background:linear-gradient(135deg,#2a1a00,#5a3800);
  border:2px solid rgba(255,180,0,.5);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:50}
#hint-btn .hint-icon{font-size:20px}
#hint-btn .hint-label{font-size:9px;color:rgba(255,180,0,.9);font-weight:900;letter-spacing:.5px}
#hint-btn .hint-cost{font-size:9px;color:rgba(255,180,0,.7);font-weight:800}
#hint-btn.no-points{animation:hintShake .3s ease}
@keyframes hintShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* OVERLAY */
#overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,30,.85);backdrop-filter:blur(12px);
  align-items:center;justify-content:center}
#overlay.show{display:flex}
#ocard{background:rgba(5,10,40,.92);border:1.5px solid rgba(100,200,255,.35);
  border-radius:28px;padding:36px 28px;text-align:center;width:88%;max-width:340px}
#ocard h2{font-family:'Orbitron',sans-serif;font-size:22px;margin-bottom:6px;
  background:linear-gradient(135deg,#43ea80,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#ocard .lvl-info{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:10px}
#ocard .score-disp{font-size:30px;font-weight:900;color:#ffb300;margin-bottom:22px;
  font-family:'Orbitron',sans-serif}
#next-btn{background:linear-gradient(135deg,#1a56d6,#00d4ff);color:#fff;border:none;
  border-radius:22px;padding:14px 40px;font-size:18px;font-weight:900;cursor:pointer;
  font-family:'Nunito',sans-serif}
#next-btn:active{transform:scale(.95)}

/* TOAST */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(30,30,60,.95);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:10px 24px;font-size:14px;font-weight:800;color:#fff;
  z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* CONFETTI */
.conf{position:fixed;top:-10px;border-radius:2px;z-index:400;pointer-events:none;
  animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

@keyframes cardIn{0%{transform:scale(.8) translateY(20px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div id="main-menu">
  <div id="menu-card">
    <div class="menu-title">KELİME<br>AVCISI</div>
    <div class="menu-sub">🔍 Harfleri birleştir, kelimeleri keşfet!</div>
    <button class="menu-btn" id="btn-new" onclick="startNew()">🎮 YENİ OYUN</button>
    <button class="menu-btn" id="btn-continue" onclick="startContinue()">▶️ DEVAM ET</button>
    <div class="menu-save-info" id="save-info"></div>
  </div>
</div>

<div id="game">
  <div id="header">
    <div class="hbadge" id="lvl-badge">Bölüm 1</div>
    <div id="title">KELİME AVCISI</div>
    <div class="hbadge" id="score-badge">⭐<span id="score-val">0</span></div>
  </div>

  <div id="slots-area"></div>

  <div id="found-row"><div id="found-word"></div></div>

  <div id="bottom">
    <div id="progress-row">
      <div id="prog-bar-bg"><div id="prog-bar"></div></div>
      <div id="prog-text">0/0</div>
    </div>
    <div id="cur-word">?</div>
    <div id="circle-wrap">
      <svg id="svg-lines"></svg>
    </div>
  </div>
</div>

<button id="hint-btn" onclick="useHint()">
  <span class="hint-icon">💡</span>
  <span class="hint-label">İPUCU</span>
  <span class="hint-cost">-100 ⭐</span>
</button>

<div id="overlay">
  <div id="ocard">
    <h2>🌟 TAMAMLANDI!</h2>
    <div class="lvl-info" id="o-lvl-info"></div>
    <div class="score-disp" id="o-score"></div>
    <button id="next-btn" onclick="nextLevel()">Sonraki Bölüm →</button>
  </div>
</div>

<div id="toast"></div>

function getPuzzle(lvl){
  const idx=Math.min(lvl,1000)-1;
  const d=LEVELS_DB[idx]||LEVELS_DB[0];
  return{
    name:`Bölüm ${lvl}`,
    letters:[...d.l],
    allWords:[...d.w],
    placements:d.p||[],
    required:[...d.r]
  };
}

function saveProgress(){
  try{localStorage.setItem('ka_level',lvlIdx);localStorage.setItem('ka_score',score);}catch(e){}
}
function loadProgress(){
  try{return{lvl:parseInt(localStorage.getItem('ka_level'))||1,score:parseInt(localStorage.getItem('ka_score'))||0};}
  catch(e){return{lvl:1,score:0};}
}
function hasSave(){
  try{const l=parseInt(localStorage.getItem('ka_level'));return l&&l>1;}catch(e){return false;}
}
function startNew(){
  try{localStorage.removeItem('ka_level');localStorage.removeItem('ka_score');}catch(e){}
  lvlIdx=1;score=0;
  document.getElementById('score-val').textContent=0;
  hideMenu();init();
}
function startContinue(){
  if(document.getElementById('btn-continue').classList.contains('disabled'))return;
  const s=loadProgress();lvlIdx=s.lvl;score=s.score;
  document.getElementById('score-val').textContent=score;
  hideMenu();init();
}
function hideMenu(){
  const m=document.getElementById('main-menu');
  m.classList.add('hide');
}

const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
function getAC(){if(!ac)try{ac=new AC();}catch(e){}return ac;}

function playTone(freq,type,vol,dur,delay=0){
  const a=getAC();if(!a)return;
  try{
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;o.frequency.setValueAtTime(freq,a.currentTime+delay);
    g.gain.setValueAtTime(0,a.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,a.currentTime+delay+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.start(a.currentTime+delay);o.stop(a.currentTime+delay+dur+0.05);
  }catch(e){}
}

function soundClick(){
  playTone(600,'sine',0.15,0.08);
}
function soundSuccess(){
  [0,0.08,0.16].forEach((d,i)=>{
    playTone([523,659,784][i],'sine',0.2,0.15,d);
  });
}
function soundError(){
  playTone(200,'sawtooth',0.15,0.15);
  playTone(150,'sawtooth',0.1,0.15,0.1);
}
function soundLevelComplete(){
  [0,0.1,0.2,0.3,0.45].forEach((d,i)=>{
    playTone([523,587,659,698,784][i],'sine',0.25,0.2,d);
  });
}

const themes=[
  {top:'#050820',bot:'#0a1240',stars:'#ffffff'},
  {top:'#0d0020',bot:'#1a0040',stars:'#e0d0ff'},
  {top:'#001020',bot:'#002040',stars:'#c0e8ff'},
  {top:'#0a0500',bot:'#201000',stars:'#ffe0a0'},
  {top:'#001a00',bot:'#003010',stars:'#a0ffa0'},
  {top:'#200010',bot:'#400020',stars:'#ffc0d0'},
  {top:'#000a1a',bot:'#001530',stars:'#a0d0ff'},
  {top:'#0a0a00',bot:'#1a1a00',stars:'#ffffa0'},
];
let themeIdx=0;
const canvas=document.getElementById('bgCanvas');
const ctx=canvas.getContext('2d');
let stars=[];

function initBg(){
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  stars=Array.from({length:180},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    r:Math.random()*2.5+.5,a:Math.random()*.8+.2,
    blink:Math.random()*3+1
  }));
}
let bgT=0;
function drawBg(){
  const t=themes[themeIdx%themes.length];
  const grd=ctx.createLinearGradient(0,0,0,canvas.height);
  grd.addColorStop(0,t.top);grd.addColorStop(1,t.bot);
  ctx.fillStyle=grd;ctx.fillRect(0,0,canvas.width,canvas.height);
  bgT+=.02;
  stars.forEach(s=>{
    const a=s.a*(0.6+0.4*Math.sin(bgT*s.blink));
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();
  });
  requestAnimationFrame(drawBg);
}

// ═══════════════════════════════════════════════
// CROSSWORD GRID RENDER
// ═══════════════════════════════════════════════
function renderSlots(){
  const area=document.getElementById('slots-area');
  area.innerHTML='';
  if(!puzzle||!puzzle.placements.length)return;

  const placements=puzzle.placements;

  // Calculate bounds
  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  placements.forEach(p=>{
    const endR=p.dir==='V'?p.row+p.word.length-1:p.row;
    const endC=p.dir==='H'?p.col+p.word.length-1:p.col;
    minR=Math.min(minR,p.row);maxR=Math.max(maxR,endR);
    minC=Math.min(minC,p.col);maxC=Math.max(maxC,endC);
  });

  const rows=maxR-minR+1,cols=maxC-minC+1;
  const maxW=(Math.min(window.innerWidth,480)-24);
  const maxH=window.innerHeight*0.38;
  const CELL=Math.max(Math.floor(Math.min(maxW/cols,maxH/rows,42)),22);
  const FONT=Math.max(Math.floor(CELL*0.48),10);

  // Build grid map
  const gridMap={};
  puzzle.allWords.forEach((word,wi)=>{
    const p=placements[wi];
    if(!p)return;
    for(let i=0;i<word.length;i++){
      const r=p.dir==='V'?p.row+i:p.row;
      const c=p.dir==='H'?p.col+i:p.col;
      const key=r+'_'+c;
      if(!gridMap[key])gridMap[key]={char:word[i],words:[]};
      if(!gridMap[key].words.includes(wi))gridMap[key].words.push(wi);
    }
  });

  const grid=document.createElement('div');
  grid.id='crossword-grid';
  grid.style.gridTemplateColumns=`repeat(${cols},${CELL}px)`;
  grid.style.gridTemplateRows=`repeat(${rows},${CELL}px)`;
  grid.style.gap='2px';

  for(let r=minR;r<=maxR;r++){
    for(let c=minC;c<=maxC;c++){
      const cell=document.createElement('div');
      cell.className='cw-cell';
      cell.style.width=CELL+'px';
      cell.style.height=CELL+'px';
      cell.style.fontSize=FONT+'px';
      const key=r+'_'+c;
      if(gridMap[key]){
        cell.dataset.key=key;
        cell.dataset.char=gridMap[key].char;
        cell.dataset.words=gridMap[key].words.join(',');
        const anyFound=gridMap[key].words.some(wi=>found.has(puzzle.allWords[wi]));
        if(anyFound){
          cell.classList.add('found');
          cell.textContent=gridMap[key].char;
        } else {
          cell.classList.add('pending');
        }
      } else {
        cell.classList.add('empty');
      }
      grid.appendChild(cell);
    }
  }
  area.appendChild(grid);
}

// ═══════════════════════════════════════════════
// LETTER CIRCLE
// ═══════════════════════════════════════════════
function renderCircle(){
  const wrap=document.getElementById('circle-wrap');
  const S=wrap.offsetWidth||220;
  const half=S/2;
  const N=puzzle.letters.length;
  const R=half*0.72;
  wrap.querySelectorAll('.lbtn').forEach(b=>b.remove());

  puzzle.letters.forEach((ch,i)=>{
    const ang=(2*Math.PI*i/N)-Math.PI/2;
    const x=half+R*Math.cos(ang);
    const y=half+R*Math.sin(ang);
    const btn=document.createElement('div');
    btn.className='lbtn';
    btn.textContent=ch;
    btn.dataset.i=i;btn.dataset.x=x;btn.dataset.y=y;
    const bw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--lbtn-size')||'56');
    const BW=Math.min(56,S*0.23);
    btn.style.left=(x-BW/2)+'px';
    btn.style.top=(y-BW/2)+'px';
    btn.style.width=BW+'px';btn.style.height=BW+'px';
    btn.style.fontSize=Math.max(BW*0.4,12)+'px';
    wrap.appendChild(btn);
  });

  const svg=document.getElementById('svg-lines');
  svg.setAttribute('viewBox',`0 0 ${S} ${S}`);
  svg.innerHTML='';
}

function drawLines(){
  const svg=document.getElementById('svg-lines');
  svg.innerHTML='';
  if(selected.length<2)return;
  for(let i=0;i<selected.length-1;i++){
    const a=document.querySelector(`.lbtn[data-i="${selected[i]}"]`);
    const b=document.querySelector(`.lbtn[data-i="${selected[i+1]}"]`);
    if(!a||!b)continue;
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',a.dataset.x);line.setAttribute('y1',a.dataset.y);
    line.setAttribute('x2',b.dataset.x);line.setAttribute('y2',b.dataset.y);
    line.setAttribute('stroke','rgba(67,234,128,.7)');line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
  }
}

// ═══════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════
function updateProgress(){
  const total=puzzle.allWords.length;
  const done=found.size;
  document.getElementById('prog-bar').style.width=(done/total*100)+'%';
  document.getElementById('prog-text').textContent=done+'/'+total;
}

// ═══════════════════════════════════════════════
// TOUCH / MOUSE INPUT
// ═══════════════════════════════════════════════
function getBtn(el){return el.closest('.lbtn');}

function startDrag(btn){
  if(!btn)return;
  dragging=true;
  const i=parseInt(btn.dataset.i);
  selected=[i];
  btn.classList.add('active');
  soundClick();
  updateCurWord();drawLines();
}
function moveDrag(btn){
  if(!dragging||!btn)return;
  const i=parseInt(btn.dataset.i);
  if(selected.includes(i))return;
  selected.push(i);
  btn.classList.add('active');
  soundClick();
  updateCurWord();drawLines();
}
function endDrag(){
  if(!dragging)return;
  dragging=false;
  submitWord();
  selected=[];
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active','used'));
  document.getElementById('cur-word').textContent='?';
  drawLines();
}

function updateCurWord(){
  const w=selected.map(i=>puzzle.letters[i]).join('');
  document.getElementById('cur-word').textContent=w||'?';
}

// Touch events
const wrap=document.getElementById('circle-wrap');
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el)startDrag(el.closest('.lbtn'));
},{passive:false});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el)moveDrag(el.closest('.lbtn'));
},{passive:false});
wrap.addEventListener('touchend',e=>{e.preventDefault();endDrag();},{passive:false});

// Mouse events
wrap.addEventListener('mousedown',e=>{const b=e.target?.closest('.lbtn');if(b)startDrag(b);});
wrap.addEventListener('mousemove',e=>{if(dragging){const b=e.target?.closest('.lbtn');if(b)moveDrag(b);}});
wrap.addEventListener('mouseup',endDrag);
document.addEventListener('mouseup',endDrag);

// ═══════════════════════════════════════════════
// WORD SUBMISSION
// ═══════════════════════════════════════════════
function submitWord(){
  const word=selected.map(i=>puzzle.letters[i]).join('');
  if(word.length<2)return;
  if(found.has(word)){showToast('Zaten bulundu!');shakeWord();return;}
  if(puzzle.allWords.includes(word)){
    found.add(word);
    score+=word.length*10;
    document.getElementById('score-val').textContent=score;
    saveProgress();
    soundSuccess();
    showFoundWord(word);
    revealCrosswordCells(word);
    updateProgress();
    if(found.size===puzzle.allWords.length){
      setTimeout(showLevelComplete,800);
    }
  } else {
    shakeWord();
    soundError();
    showToast('Bu kelime geçersiz!');
  }
}

function revealCrosswordCells(word){
  const wi=puzzle.allWords.indexOf(word);
  document.querySelectorAll('.cw-cell.pending').forEach(cell=>{
    if(!cell.dataset.words)return;
    const words=cell.dataset.words.split(',').map(Number);
    if(words.includes(wi)){
      cell.classList.remove('pending');
      cell.classList.add('found');
      cell.textContent=cell.dataset.char;
    }
  });
}

function shakeWord(){
  const cw=document.getElementById('cur-word');
  cw.classList.add('shake');
  setTimeout(()=>cw.classList.remove('shake'),400);
}

function showFoundWord(word){
  const el=document.getElementById('found-word');
  el.textContent=word;el.style.opacity=1;
  setTimeout(()=>el.style.opacity=0,1200);
  spawnConfetti();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ═══════════════════════════════════════════════
// HINT
// ═══════════════════════════════════════════════
function useHint(){
  const remaining=puzzle.allWords.filter(w=>!found.has(w));
  if(!remaining.length)return;
  if(score<100){
    document.getElementById('hint-btn').classList.add('no-points');
    setTimeout(()=>document.getElementById('hint-btn').classList.remove('no-points'),400);
    showToast('Yeterli puan yok! (100 gerekli)');
    return;
  }
  score-=100;
  document.getElementById('score-val').textContent=score;
  const word=remaining[0];
  found.add(word);
  revealCrosswordCells(word);
  showFoundWord(word);
  updateProgress();
  saveProgress();
  if(found.size===puzzle.allWords.length)setTimeout(showLevelComplete,800);
}

// ═══════════════════════════════════════════════
// LEVEL COMPLETE
// ═══════════════════════════════════════════════
function showLevelComplete(){
  soundLevelComplete();
  document.getElementById('o-lvl-info').textContent=`Bölüm ${lvlIdx} tamamlandı!`;
  document.getElementById('o-score').textContent='⭐ '+score;
  document.getElementById('overlay').classList.add('show');
  themeIdx++;spawnConfetti();spawnConfetti();
}
function nextLevel(){
  document.getElementById('overlay').classList.remove('show');
  lvlIdx=Math.min(lvlIdx+1,1000);
  saveProgress();init();
}

// ═══════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════
function spawnConfetti(){
  const colors=['#43ea80','#00d4ff','#ffb300','#ff6b6b','#a78bfa'];
  for(let i=0;i<22;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.cssText=`left:${20+Math.random()*60}%;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;
      background:${colors[i%colors.length]};transform:rotate(${Math.random()*360}deg);
      animation-duration:${1.2+Math.random()*1.2}s;animation-delay:${Math.random()*.4}s;opacity:.9`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2800);
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  found=new Set();selected=[];dragging=false;
  puzzle=getPuzzle(lvlIdx);
  document.getElementById('lvl-badge').textContent='Bölüm '+lvlIdx;
  document.getElementById('score-val').textContent=score;
  renderSlots();
  renderCircle();
  updateProgress();
  document.getElementById('cur-word').textContent='?';
  document.getElementById('found-word').style.opacity=0;
}

window.addEventListener('resize',()=>{initBg();if(puzzle){renderSlots();renderCircle();}});

window.addEventListener('load',()=>{
  initBg();drawBg();
  const btn=document.getElementById('btn-continue');
  const info=document.getElementById('save-info');
  if(hasSave()){
    const s=loadProgress();
    btn.classList.remove('disabled');
    info.textContent='📍 Bölüm '+s.lvl+' — '+s.score+' puan';
  } else {
    btn.classList.add('disabled');
    info.textContent='Henüz kayıt yok';
  }
});
</script>
